{% extends "base.html" %}
{% block title %}Вход учителя — MorphoSyntaxTrening{% endblock %}
{% block content %}
<div style="max-width:420px;margin:60px auto;">
  <div class="panel">
    <div class="eyebrow" style="background:#dbeafe;color:#1d4ed8;">Учитель</div>
    <h2>Вход для учителя</h2>
    <form method="POST" action="/teacher/login" class="form-grid">
      <div class="field-group">
        <label>Email</label>
        <input type="email" name="email" required autofocus placeholder="teacher@school.ru">
      </div>
      <div class="field-group">
        <label>Пароль</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary">Войти</button>
    </form>
    <p style="font-size:13px;color:var(--text-soft);margin-top:16px;">
      Аккаунт выдаётся администратором системы.
    </p>
  </div>
</div>
{% endblock %}
