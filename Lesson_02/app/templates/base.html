<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мой сайт{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        nav {
            background: #2E1065;
            padding: 1rem 2rem;
            display: flex;
            gap: 2rem;
        }
        nav a {
            color: #C084FC;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover { color: #fff; }
        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Главная</a>
        <a href="/about">О проекте</a>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        Python Web Developer · FastAPI + Jinja2
    </footer>
</body>
</html>
