# Версия формата файла docker-compose
version: "3.9"

# services — описываем все контейнеры (сервисы), которые будут запущены вместе
services:

  # Сервис "db" — контейнер с базой данных PostgreSQL
  db:
    # image — готовый образ из Docker Hub, который будем использовать
    # postgres:16 — официальный образ PostgreSQL версии 16
    image: postgres:16

    # environment — переменные окружения внутри контейнера
    # Они настраивают PostgreSQL при первом запуске
    environment:
      POSTGRES_USER: postgres      # имя пользователя для подключения к базе данных
      POSTGRES_PASSWORD: postgres  # пароль этого пользователя
      POSTGRES_DB: robots_db       # имя базы данных, которая будет создана автоматически

    # ports — пробрасываем порты: "порт_на_компьютере:порт_в_контейнере"
    # 5432:5432 — стандартный порт PostgreSQL; теперь можно подключиться с компьютера
    ports:
      - "5432:5432"

    # volumes — монтируем хранилище данных, чтобы данные не терялись при перезапуске
    # robots_data — имя именованного тома (описан внизу файла)
    # /var/lib/postgresql/data — папка внутри контейнера, где PostgreSQL хранит данные
    volumes:
      - robots_data:/var/lib/postgresql/data

    # healthcheck — проверяет, готова ли база принимать подключения
    # Без этого наш веб-сервер может стартовать раньше базы и упасть с ошибкой
    healthcheck:
      # test — команда проверки: pg_isready проверяет, принимает ли PostgreSQL соединения
      # CMD-SHELL — запускает команду через shell
      # -U postgres — от имени пользователя postgres
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s   # проверять каждые 5 секунд
      timeout: 5s    # если проверка не ответила за 5 секунд — считать неудачей
      retries: 5     # попробовать 5 раз, прежде чем объявить сервис нездоровым

  # Сервис "web" — контейнер с нашим Python/FastAPI приложением
  web:
    # build — собирать образ из Dockerfile в текущей папке (.)
    # Вместо готового образа Docker сам соберёт образ по нашему Dockerfile
    build: .

    # ports — пробрасываем порт 8000: браузер откроет http://localhost:8000
    ports:
      - "8000:8000"

    # environment — переменные окружения для нашего приложения
    environment:
      # DATABASE_URL — строка подключения к базе данных
      # db — имя сервиса выше (Docker автоматически преобразует его в IP-адрес контейнера)
      DATABASE_URL: postgresql://postgres:postgres@db:5432/robots_db

    # volumes — монтируем папку с кодом в контейнер
    # . — текущая папка на нашем компьютере
    # /app — папка внутри контейнера (WORKDIR из Dockerfile)
    # Благодаря этому изменения в коде сразу видны в контейнере (не нужно пересобирать)
    volumes:
      - .:/app

    # depends_on — зависимости: web стартует только после того, как db будет готова
    # condition: service_healthy — ждать пока healthcheck базы не пройдёт успешно
    depends_on:
      db:
        condition: service_healthy

# volumes — описываем именованные тома (постоянное хранилище данных)
# robots_data — том для хранения файлов PostgreSQL между перезапусками контейнера
# (оставляем пустым — Docker сам управляет его расположением на диске)
volumes:
  robots_data:
