{% extends "base.html" %}
{% block title %}Вход ученика — MorphoTrening{% endblock %}
{% block content %}

<div style="max-width:460px;margin:50px auto;">
  <div class="panel">
    <div class="eyebrow" style="background:#dcfce7;color:#15803d;">Ученик</div>
    <h2>Вход в тренажёр</h2>
    <p style="color:var(--text-soft);">Выберите свою группу и фамилию, затем введите пароль, который выдал учитель.</p>

    <form method="POST" class="form-grid" style="margin-top:20px;" id="login-form">
      <div class="field-group">
        <label for="group_id">Группа / Класс</label>
        <select id="group_id" name="group_id" required onchange="loadStudents(this.value)">
          <option value="">— Выберите группу —</option>
          {% for g in groups %}
          <option value="{{ g.id }}">{{ g.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field-group">
        <label for="student_id">Ваша фамилия и имя</label>
        <select id="student_id" name="student_id" required disabled>
          <option value="">— Сначала выберите группу —</option>
        </select>
      </div>

      <div class="field-group">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" placeholder="Введите ваш пароль" required>
      </div>

      <button type="submit" class="btn btn-success" style="width:100%;justify-content:center;">Войти в тренажёр</button>
    </form>

    <p style="text-align:center;margin-top:16px;">
      <a href="{{ url_for('teacher_login') }}" style="color:var(--accent);text-decoration:none;">Войти как учитель</a>
    </p>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
async function loadStudents(groupId) {
  const sel = document.getElementById('student_id');
  sel.innerHTML = '<option value="">Загрузка...</option>';
  sel.disabled = true;
  if (!groupId) {
    sel.innerHTML = '<option value="">— Сначала выберите группу —</option>';
    return;
  }
  try {
    const res = await fetch(`/api/students-by-group?group_id=${groupId}`);
    const data = await res.json();
    sel.innerHTML = '<option value="">— Выберите ученика —</option>';
    data.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.name;
      sel.appendChild(opt);
    });
    sel.disabled = false;
  } catch {
    sel.innerHTML = '<option value="">Ошибка загрузки</option>';
  }
}
</script>
{% endblock %}
