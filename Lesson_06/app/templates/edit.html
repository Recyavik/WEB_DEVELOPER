{% extends "base.html" %}
{% block title %}Редактировать — {{ athlete.name }}{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Редактировать карточку</h1>
    <p class="subtitle">Спортсмен: <strong>{{ athlete.name }}</strong></p>

    <form method="post" action="/edit/{{ athlete.id }}" class="athlete-form card">
        <div class="form-group">
            <label for="name">Полное имя</label>
            <input type="text" id="name" name="name" required
                   value="{{ athlete.name }}" class="form-input">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="sport">Вид спорта</label>
                <input type="text" id="sport" name="sport" required
                       value="{{ athlete.sport }}" class="form-input">
            </div>
            <div class="form-group">
                <label for="level">Уровень подготовки</label>
                <select id="level" name="level" class="form-input">
                    <option value="beginner" {% if athlete.level == "beginner" %}selected{% endif %}>Начинающий</option>
                    <option value="intermediate" {% if athlete.level == "intermediate" %}selected{% endif %}>Средний</option>
                    <option value="advanced" {% if athlete.level == "advanced" %}selected{% endif %}>Продвинутый</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="age">Возраст (лет)</label>
                <input type="number" id="age" name="age" required
                       min="10" max="100" value="{{ athlete.age }}" class="form-input">
            </div>
            <div class="form-group">
                <label for="weight">Вес (кг)</label>
                <input type="number" id="weight" name="weight" required
                       step="0.1" min="30" max="200" value="{{ athlete.weight }}" class="form-input">
            </div>
            <div class="form-group">
                <label for="height">Рост (см)</label>
                <input type="number" id="height" name="height" required
                       step="0.1" min="100" max="250" value="{{ athlete.height }}" class="form-input">
            </div>
        </div>

        <div class="form-group">
            <label for="goals">Цели тренировок (необязательно)</label>
            <textarea id="goals" name="goals" rows="3"
                      class="form-input">{{ athlete.goals or "" }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Сохранить изменения</button>
            <a href="/athlete/{{ athlete.id }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
