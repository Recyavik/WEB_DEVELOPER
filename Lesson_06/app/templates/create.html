{% extends "base.html" %}
{% block title %}Новый спортсмен — FitnessClub{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Добавить спортсмена</h1>

    <form method="post" action="/create" class="athlete-form card">
        <div class="form-group">
            <label for="name">Полное имя</label>
            <input type="text" id="name" name="name" required
                   placeholder="Иван Петров" class="form-input">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="sport">Вид спорта</label>
                <input type="text" id="sport" name="sport" required
                       placeholder="Бокс, Кроссфит, Плавание..." class="form-input">
            </div>
            <div class="form-group">
                <label for="level">Уровень подготовки</label>
                <select id="level" name="level" class="form-input">
                    <option value="beginner">Начинающий</option>
                    <option value="intermediate">Средний</option>
                    <option value="advanced">Продвинутый</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="age">Возраст (лет)</label>
                <input type="number" id="age" name="age" required
                       min="10" max="100" class="form-input">
            </div>
            <div class="form-group">
                <label for="weight">Вес (кг)</label>
                <input type="number" id="weight" name="weight" required
                       step="0.1" min="30" max="200" class="form-input">
            </div>
            <div class="form-group">
                <label for="height">Рост (см)</label>
                <input type="number" id="height" name="height" required
                       step="0.1" min="100" max="250" class="form-input">
            </div>
        </div>

        <div class="form-group">
            <label for="goals">Цели тренировок (необязательно)</label>
            <textarea id="goals" name="goals" rows="3"
                      placeholder="Похудеть на 10 кг, подготовиться к соревнованиям..."
                      class="form-input"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Сохранить</button>
            <a href="/" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
