version: "3.9"

services:
  # База данных PostgreSQL
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness
    ports:
      - "5432:5432"
    volumes:
      # Данные сохраняются между перезапусками
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Наш FastAPI сервер
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fitness
    volumes:
      # Монтируем код для автообновления без rebuild
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
