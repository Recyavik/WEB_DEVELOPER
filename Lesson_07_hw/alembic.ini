# ─── alembic.ini ───────────────────────────────────────────────────────────
# Главный конфигурационный файл Alembic.
# Alembic читает его при каждом запуске команд вроде «alembic upgrade head».

# [alembic] — основная секция настроек Alembic.
[alembic]

# script_location — папка, где лежат файлы миграций и env.py.
# Alembic будет искать migrations/versions/*.py именно здесь.
script_location = alembic

# file_template — шаблон имени файла для новых миграций.
# %%(rev)s  — автоматически сгенерированный ID ревизии (например: a1b2c3d4)
# %%(slug)s — slug из описания миграции (например: add_description)
# Двойной %% нужен для экранирования: configparser Python читает % как
# начало интерполяции, поэтому %% означает буквальный символ %.
# Итоговое имя файла будет выглядеть так: 001_init.py
file_template = %%(rev)s_%%(slug)s

# prepend_sys_path — добавляет текущую директорию в sys.path Python.
# Точка (.) = текущая папка = корень проекта.
# Без этого Python не смог бы найти наш пакет «app» при выполнении env.py.
prepend_sys_path = .

# version_path_separator — разделитель путей для нескольких папок версий.
# «os» означает использовать системный разделитель (/ на Linux, \ на Windows).
version_path_separator = os

# sqlalchemy.url — строка подключения к базе данных по умолчанию.
# Используется, если переменная окружения DATABASE_URL не задана.
# Формат: postgresql://пользователь:пароль@хост:порт/база_данных
# В Docker «db» — это имя сервиса из docker-compose.yml, Docker сам его разрешит.
sqlalchemy.url = postgresql://weather_user:weather_pass@db:5432/weather_db

# [post_write_hooks] — секция для хуков, выполняемых после записи миграций.
# Здесь можно настроить автоформатирование (black, isort) — оставляем пустой.
[post_write_hooks]

# ─── Настройка логирования ─────────────────────────────────────────────────
# Следующие секции настраивают, какие сообщения показывать в терминале.

# [loggers] — перечень всех логгеров (источников сообщений).
[loggers]
keys = root,sqlalchemy,alembic

# [handlers] — перечень обработчиков (куда выводить сообщения).
[handlers]
keys = console

# [formatters] — перечень форматтеров (как форматировать сообщения).
[formatters]
keys = generic

# [logger_root] — корневой логгер (все сообщения, не захваченные другими).
[logger_root]
level = WARN       # Показывать только WARNING и выше (не INFO, не DEBUG)
handlers = console # Выводить в консоль
qualname =         # Пустое = корневой логгер

# [logger_sqlalchemy] — логгер для SQL-запросов SQLAlchemy.
[logger_sqlalchemy]
level = WARN             # WARN — не показывать сами SQL-запросы (было бы INFO)
handlers =               # Наследовать от родителя
qualname = sqlalchemy.engine  # Имя модуля

# [logger_alembic] — логгер для самого Alembic.
[logger_alembic]
level = INFO       # INFO — показывать «Running upgrade 001 -> 002» и т.п.
handlers =         # Наследовать от родителя
qualname = alembic # Имя модуля

# [handler_console] — вывод сообщений в консоль (stderr).
[handler_console]
class = StreamHandler    # Стандартный обработчик потока вывода
args = (sys.stderr,)     # Выводить в stderr (поток ошибок — виден в docker logs)
level = NOTSET           # Не фильтровать здесь — фильтрует логгер выше
formatter = generic      # Использовать форматтер «generic»

# [formatter_generic] — формат строки лога.
[formatter_generic]
# %(levelname)-5.5s — уровень (WARN, INFO) выровненный в 5 символов
# [%(name)s]        — имя логгера (alembic, sqlalchemy.engine)
# %(message)s       — само сообщение
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S       # Формат времени: часы:минуты:секунды
