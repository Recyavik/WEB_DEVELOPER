# ─── docker-compose.yml ────────────────────────────────────────────────────
# Docker Compose — инструмент для запуска нескольких контейнеров вместе.
# Вместо того чтобы запускать каждый контейнер вручную, мы описываем
# всю систему здесь, и одна команда «docker compose up» поднимает всё.

# services — раздел, в котором перечислены все контейнеры (сервисы).
services:

  # ── Сервис базы данных ──────────────────────────────────────────────────
  db:
    # image — готовый образ из Docker Hub, скачивается автоматически.
    # postgres:15 — официальный образ PostgreSQL версии 15.
    image: postgres:15

    # environment — переменные окружения, которые PostgreSQL читает при старте.
    # Они говорят серверу: какого пользователя создать и какую базу данных.
    environment:
      POSTGRES_USER: weather_user       # Имя пользователя БД
      POSTGRES_PASSWORD: weather_pass   # Пароль пользователя БД
      POSTGRES_DB: weather_db           # Название базы данных, которую создать

    # volumes — монтирование томов (постоянное хранилище данных).
    # pgdata:/var/lib/postgresql/data означает:
    #   pgdata      — именованный том (Docker управляет им сам, папка внизу файла)
    #   :/var/lib/postgresql/data — путь внутри контейнера, где PostgreSQL хранит данные
    # Без этого все данные удалялись бы при перезапуске контейнера!
    volumes:
      - pgdata:/var/lib/postgresql/data

    # healthcheck — проверка здоровья контейнера.
    # Docker периодически запускает эту команду, чтобы убедиться,
    # что PostgreSQL готов принимать подключения.
    healthcheck:
      # pg_isready — утилита PostgreSQL: возвращает 0 (успех), если сервер готов.
      # -U weather_user — подключаться от имени этого пользователя.
      # -d weather_db   — проверять именно эту базу данных.
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weather_db"]
      interval: 5s   # Проверять каждые 5 секунд
      timeout: 5s    # Считать провалом, если команда не ответила за 5 секунд
      retries: 10    # После 10 неудачных попыток — контейнер «нездоров»

  # ── Сервис веб-приложения ───────────────────────────────────────────────
  web:
    # build — собрать образ из Dockerfile в текущей папке (точка = «здесь»).
    # В отличие от db, мы не берём готовый образ, а строим свой.
    build: .

    # ports — проброс портов: «порт_хоста:порт_контейнера».
    # "8000:8000" означает: запросы на localhost:8000 (твой компьютер)
    # перенаправлять на порт 8000 внутри контейнера.
    ports:
      - "8000:8000"

    # environment — переменные окружения для веб-контейнера.
    # DATABASE_URL — строка подключения к PostgreSQL.
    # Формат: postgresql://пользователь:пароль@хост:порт/база_данных
    # «db» в качестве хоста — это имя сервиса выше. Docker Compose
    # автоматически разрешает имена сервисов в IP-адреса контейнеров.
    environment:
      DATABASE_URL: postgresql://weather_user:weather_pass@db:5432/weather_db

    # depends_on — зависимость: запускать web ТОЛЬКО после того,
    # как db будет готова (condition: service_healthy).
    # Это гарантирует: alembic не попытается подключиться к ещё не
    # запущенному PostgreSQL.
    depends_on:
      db:
        condition: service_healthy  # Ждать, пока healthcheck не вернёт успех

    # volumes — монтируем текущую папку хоста (.) в /app контейнера.
    # Это нужно для --reload: uvicorn видит изменения файлов на хосте
    # и перезапускается автоматически без пересборки образа.
    volumes:
      - .:/app

# volumes — объявление именованных томов.
# pgdata создаётся один раз и живёт, даже если контейнер пересоздан.
# Docker хранит данные этого тома в своей внутренней папке на хосте.
volumes:
  pgdata:
