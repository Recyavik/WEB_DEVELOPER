# Конфигурационный файл Alembic
# Создаётся командой: alembic init alembic

[alembic]
# Путь к папке со скриптами миграций
script_location = alembic

# Шаблон для имён файлов версий: дата_время_rev_slug.py
file_template = %%(rev)s_%%(slug)s

# Кодировка исходников
prepend_sys_path = .

# URL подключения к БД
# ВАЖНО: в нашем проекте URL переопределяется из переменной окружения в env.py
# Это значение используется только если env.py не переопределяет его
sqlalchemy.url = postgresql://mks_user:mks_pass@db:5432/mks_db

[post_write_hooks]
# Хуки после создания файла миграции (необязательно)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
