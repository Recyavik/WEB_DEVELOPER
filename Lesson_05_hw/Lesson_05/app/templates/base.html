<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — ИМТ Калькулятор</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<header>
    <div class="logo">
        ИМТ<span>Calc</span>
    </div>
    <nav>
        {# Навигация — ТОЛЬКО страницы этого занятия #}
        <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>
            Калькулятор
        </a>
        <a href="/history" {% if request.url.path == "/history" %}class="active"{% endif %}>
            История
        </a>
    </nav>
</header>

<main>
    {% block content %}
    {# Сюда подставляется контент каждой страницы #}
    {% endblock %}
</main>

<footer>
    Занятие 5 — PostgreSQL + psycopg2 · Python Web Developer
</footer>

</body>
</html>
